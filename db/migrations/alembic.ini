# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = db/migrations

# template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# sys.path path, uses relative path from current working directory
prepend_sys_path = .

# path to alembic template
template =

# Output encoding
output_encoding = utf-8

# Database URL (will be overridden by env.py from settings)
sqlalchemy.url = postgresql://radar_user:radar_password@localhost:5432/radar_trading


[post_write_hooks]
# This section defines scripts or Python functions that are run
# after a migration script has been written.

# Lint with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
